workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: 16.2
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          find . -name "version.plist" -delete 2>/dev/null || true
          echo "All caches wiped"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" ios/Runner/Info.plist
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e

          echo "=== PRE-BUILD ==="
          echo "pubspec: $(grep '^version:' pubspec.yaml)"
          cat ios/Flutter/Generated.xcconfig 2>/dev/null || echo "(Generated.xcconfig not yet created)"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/Runner/Info.plist 2>/dev/null || true

          flutter build ipa --release --build-number 50 --export-options-plist=/Users/builder/export_options.plist

          echo "=== POST-BUILD ==="
          XCARCHIVE=$(find build/ios/archive -name "*.xcarchive" 2>/dev/null | head -1)
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          echo "xcarchive: $XCARCHIVE"
          echo "IPA: $IPA_PATH"

          if [ -z "$IPA_PATH" ]; then
            echo "FATAL: flutter build ipa produced no IPA"
            exit 1
          fi

          rm -rf /tmp/ipa_check
          unzip -o "$IPA_PATH" -d /tmp/ipa_check > /dev/null 2>&1
          APP_PATH=$(find /tmp/ipa_check/Payload -name "*.app" 2>/dev/null | head -1)
          BUILT_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          rm -rf /tmp/ipa_check
          echo "CFBundleVersion in built IPA: $BUILT_VER"

          if [ "$BUILT_VER" = "50" ]; then
            echo "Version OK — moving IPA to verified-ipa/"
            mkdir -p build/ios/verified-ipa
            cp "$IPA_PATH" build/ios/verified-ipa/servepoint.ipa
          else
            echo "WARN: version is $BUILT_VER, attempting xcarchive patch"
            APP_IN_ARCHIVE=$(find "$XCARCHIVE/Products/Applications" -name "*.app" 2>/dev/null | head -1)
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" "$APP_IN_ARCHIVE/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion 50" "$XCARCHIVE/Info.plist" 2>/dev/null || true
            xcodebuild -exportArchive \
              -archivePath "$XCARCHIVE" \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/patched-ipa
            PATCHED_IPA=$(find build/ios/patched-ipa -name "*.ipa" 2>/dev/null | head -1)
            rm -rf /tmp/ipa_check2
            unzip -o "$PATCHED_IPA" -d /tmp/ipa_check2 > /dev/null 2>&1
            APP_PATH2=$(find /tmp/ipa_check2/Payload -name "*.app" 2>/dev/null | head -1)
            PATCHED_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH2/Info.plist" 2>/dev/null || echo "NOT_FOUND")
            rm -rf /tmp/ipa_check2
            echo "CFBundleVersion in patched IPA: $PATCHED_VER"
            if [ "$PATCHED_VER" = "50" ]; then
              mkdir -p build/ios/verified-ipa
              cp "$PATCHED_IPA" build/ios/verified-ipa/servepoint.ipa
              echo "Patch OK — IPA version $PATCHED_VER moved to verified-ipa/"
            else
              echo "FATAL: patch failed — $PATCHED_VER"
              exit 1
            fi
          fi

    artifacts:
      - build/ios/verified-ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for review

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
