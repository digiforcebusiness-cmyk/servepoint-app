workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: 16.2
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          rm -f ios/Flutter/Generated.xcconfig
          find . -name "version.plist" -delete 2>/dev/null || true
          sed -i '' 's/VERSIONING_SYSTEM = "apple-generic";//g' \
            ios/Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" ios/Runner/Info.plist
          echo "Clean done. Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e
          TARGET_BUILD=50

          flutter build ipa --release --build-number $TARGET_BUILD \
            --export-options-plist=/Users/builder/export_options.plist

          # ── Direct IPA patch ──────────────────────────────────────────────
          # Flutter/Xcode 26.2 ignores --build-number; patch the zip directly.
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Flutter IPA: $IPA"
          [ -n "$IPA" ] || { echo "FATAL: no IPA"; exit 1; }

          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -name "*.app" | head -1)
          ORIG_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP/Info.plist")
          echo "IPA CFBundleVersion before patch: $ORIG_VER"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TARGET_BUILD" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" "$APP/Info.plist"
          echo "IPA CFBundleVersion after patch:  $TARGET_BUILD"

          # Extract entitlements from the embedded provisioning profile
          security cms -D -i "$APP/embedded.mobileprovision" -o /tmp/provision.plist
          plutil -extract Entitlements xml1 -o /tmp/entitlements.plist /tmp/provision.plist
          echo "Entitlements: $(wc -c < /tmp/entitlements.plist) bytes"

          # Get distribution signing identity from keychain
          SIGNING_ID=$(security find-identity -v -p codesigning \
            | grep "Apple Distribution" | head -1 | awk -F '"' '{print $2}')
          echo "Signing identity: $SIGNING_ID"

          # Re-sign nested frameworks (must happen before app re-sign)
          find "$APP/Frameworks" -maxdepth 1 -name "*.framework" 2>/dev/null \
          | while read FW; do
              codesign --force --sign "$SIGNING_ID" "$FW" 2>/dev/null \
                && echo "  resigned: $FW" || echo "  skip: $FW"
            done

          # Re-sign the app bundle
          codesign --force --sign "$SIGNING_ID" \
            --entitlements /tmp/entitlements.plist \
            "$APP"
          codesign -v "$APP" && echo "Signature valid" || echo "Signature check (non-fatal)"

          # Repack IPA in-place
          PATCHED=$(mktemp /tmp/p.XXXXXX.ipa)
          (cd "$WORK" && zip -qr "$PATCHED" Payload/)
          cp "$PATCHED" build/ios/ipa/servepoint.ipa
          rm -f "$PATCHED"
          rm -rf "$WORK"

          # ── Verify ───────────────────────────────────────────────────────
          rm -rf /tmp/ipav
          unzip -q build/ios/ipa/servepoint.ipa -d /tmp/ipav
          VAPP=$(find /tmp/ipav/Payload -name "*.app" | head -1)
          VVER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$VAPP/Info.plist")
          rm -rf /tmp/ipav
          echo "Verified CFBundleVersion: $VVER"
          [ "$VVER" = "$TARGET_BUILD" ] || { echo "FATAL: $VVER != $TARGET_BUILD"; exit 1; }

          # ── Upload to TestFlight ─────────────────────────────────────────
          KEY_DIR=~/.appstoreconnect/private_keys
          mkdir -p "$KEY_DIR"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/servepoint.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

          rm -f "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "UPLOAD COMPLETE"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - mobilestudio66@gmail.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
