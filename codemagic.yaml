workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: latest
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          find . -name "version.plist" -delete 2>/dev/null || true
          echo "All caches wiped"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 500" ios/Runner/Info.plist
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e

          echo "=== PRE-BUILD DIAGNOSTICS ==="
          echo "pubspec version: $(grep '^version:' pubspec.yaml)"
          echo "Generated.xcconfig:"
          cat ios/Flutter/Generated.xcconfig
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

          flutter build ipa --release --build-number 500 --export-options-plist=/Users/builder/export_options.plist

          echo "=== POST-BUILD DIAGNOSTICS ==="
          echo "Generated.xcconfig after build:"
          cat ios/Flutter/Generated.xcconfig
          XCARCHIVE="build/ios/archive/Runner.xcarchive"
          ARCH_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$XCARCHIVE/Products/Applications/Runner.app/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          echo "CFBundleVersion in xcarchive: $ARCH_VER"

          echo "=== IPA VERSION CHECK ==="
          unzip -o build/ios/ipa/servepoint.ipa -d /tmp/ipa_verify > /dev/null
          BUILT_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" /tmp/ipa_verify/Payload/Runner.app/Info.plist)
          rm -rf /tmp/ipa_verify
          echo "CFBundleVersion in IPA: $BUILT_VER"

          if [ "$BUILT_VER" != "500" ]; then
            echo "WARN: IPA has version $BUILT_VER instead of 500 — patching xcarchive and re-exporting"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 500" "$XCARCHIVE/Products/Applications/Runner.app/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion 500" "$XCARCHIVE/Info.plist" 2>/dev/null || true
            rm -rf build/ios/ipa
            xcodebuild -exportArchive \
              -archivePath "$XCARCHIVE" \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/ipa
            unzip -o build/ios/ipa/servepoint.ipa -d /tmp/ipa_verify2 > /dev/null
            PATCHED_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" /tmp/ipa_verify2/Payload/Runner.app/Info.plist)
            rm -rf /tmp/ipa_verify2
            echo "CFBundleVersion in patched IPA: $PATCHED_VER"
            if [ "$PATCHED_VER" != "500" ]; then
              echo "FATAL: xcarchive patch failed — IPA still contains $PATCHED_VER"
              exit 1
            fi
            echo "Patch successful — IPA version is now $PATCHED_VER"
          else
            echo "Version verified OK: $BUILT_VER"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for review

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
