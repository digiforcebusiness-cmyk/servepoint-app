workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: 16.2
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          find . -name "version.plist" -delete 2>/dev/null || true
          echo "All caches wiped"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" ios/Runner/Info.plist
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e
          TARGET_BUILD=50

          echo "=== PRE-BUILD ==="
          echo "Flutter: $(flutter --version 2>&1 | head -1)"
          echo "Xcode: $(xcodebuild -version 2>&1 | tr '\n' ' ')"
          echo "pubspec: $(grep '^version:' pubspec.yaml)"
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

          flutter build ipa --release --build-number $TARGET_BUILD \
            --export-options-plist=/Users/builder/export_options.plist

          echo "=== POST-FLUTTER-BUILD ==="
          echo "Generated.xcconfig:"
          cat ios/Flutter/Generated.xcconfig

          XCARCHIVE=$(find build/ios/archive -name "*.xcarchive" | head -1)
          echo "xcarchive: $XCARCHIVE"

          if [ -z "$XCARCHIVE" ]; then
            echo "FATAL: no xcarchive produced"
            exit 1
          fi

          # Inspect xcarchive version BEFORE patch
          XCARCHIVE_APP=$(find "$XCARCHIVE/Products/Applications" -name "*.app" | head -1)
          echo "xcarchive app: $XCARCHIVE_APP"
          echo "xcarchive CFBundleVersion BEFORE patch: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$XCARCHIVE_APP/Info.plist")"

          # Always patch the xcarchive (Xcode 26.2 beta ignores --build-number)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TARGET_BUILD" "$XCARCHIVE_APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion $TARGET_BUILD" "$XCARCHIVE/Info.plist" 2>/dev/null || true
          echo "xcarchive CFBundleVersion AFTER patch: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$XCARCHIVE_APP/Info.plist")"

          # Remove all IPAs flutter produced (we will create the correct one from patched xcarchive)
          rm -f build/ios/ipa/*.ipa

          # Re-export from patched xcarchive to a clean temp directory
          echo "Re-exporting from patched xcarchive..."
          rm -rf /tmp/ipa_export
          xcodebuild -exportArchive \
            -archivePath "$XCARCHIVE" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath /tmp/ipa_export

          EXPORTED_IPA=$(find /tmp/ipa_export -name "*.ipa" | head -1)
          echo "Exported IPA: $EXPORTED_IPA"

          if [ -z "$EXPORTED_IPA" ]; then
            echo "FATAL: xcodebuild -exportArchive produced no IPA"
            ls -la /tmp/ipa_export/ 2>/dev/null || true
            exit 1
          fi

          # Place at canonical path — this is where Codemagic publisher reads
          mkdir -p build/ios/ipa
          cp "$EXPORTED_IPA" build/ios/ipa/servepoint.ipa
          rm -rf /tmp/ipa_export

          # Final verification — fail build if wrong version (never upload wrong build)
          rm -rf /tmp/ipa_verify
          unzip -q build/ios/ipa/servepoint.ipa -d /tmp/ipa_verify
          FINAL_APP=$(find /tmp/ipa_verify/Payload -name "*.app" | head -1)
          FINAL_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$FINAL_APP/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          rm -rf /tmp/ipa_verify
          echo "=== FINAL CFBundleVersion: $FINAL_VER ==="
          ls -lh build/ios/ipa/

          if [ "$FINAL_VER" != "$TARGET_BUILD" ]; then
            echo "FATAL: IPA has version $FINAL_VER, expected $TARGET_BUILD — aborting to prevent wrong upload"
            exit 1
          fi
          echo "SUCCESS — build/ios/ipa/servepoint.ipa is verified at version $FINAL_VER"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for review

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
