workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: 16.2
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          find . -name "version.plist" -delete 2>/dev/null || true
          echo "All caches wiped"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" ios/Runner/Info.plist
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e

          TARGET_BUILD=50

          echo "=== PRE-BUILD ==="
          echo "pubspec: $(grep '^version:' pubspec.yaml)"
          echo "Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist 2>/dev/null || echo NOT_FOUND)"

          flutter build ipa --release --build-number $TARGET_BUILD --export-options-plist=/Users/builder/export_options.plist

          echo "=== POST-BUILD ==="
          XCARCHIVE=$(find build/ios/archive -name "*.xcarchive" 2>/dev/null | head -1)
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          echo "xcarchive: $XCARCHIVE"
          echo "IPA: $IPA_PATH"

          if [ -z "$IPA_PATH" ]; then
            echo "FATAL: flutter build ipa produced no IPA"
            exit 1
          fi

          # Check version in the IPA Codemagic will publish
          rm -rf /tmp/ipa_check
          unzip -q "$IPA_PATH" -d /tmp/ipa_check
          APP_PATH=$(find /tmp/ipa_check/Payload -name "*.app" | head -1)
          BUILT_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          rm -rf /tmp/ipa_check
          echo "CFBundleVersion in IPA: $BUILT_VER"

          if [ "$BUILT_VER" = "$TARGET_BUILD" ]; then
            echo "Version OK — $BUILT_VER matches target"
          else
            echo "WARN: IPA has version $BUILT_VER, need $TARGET_BUILD — patching xcarchive and re-exporting in-place"

            if [ -z "$XCARCHIVE" ]; then
              echo "FATAL: no xcarchive found to patch"
              exit 1
            fi

            # Patch the app bundle inside the xcarchive
            APP_IN_ARCHIVE=$(find "$XCARCHIVE/Products/Applications" -name "*.app" | head -1)
            echo "Patching $APP_IN_ARCHIVE/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $TARGET_BUILD" "$APP_IN_ARCHIVE/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion $TARGET_BUILD" "$XCARCHIVE/Info.plist" 2>/dev/null || true
            echo "xcarchive plist after patch:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_IN_ARCHIVE/Info.plist"

            # Re-export INTO build/ios/ipa/ (overwriting the original so Codemagic publishing picks it up)
            IPA_DIR=$(dirname "$IPA_PATH")
            xcodebuild -exportArchive \
              -archivePath "$XCARCHIVE" \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath "$IPA_DIR"

            # Verify patched IPA
            rm -rf /tmp/ipa_check2
            unzip -q "$IPA_PATH" -d /tmp/ipa_check2
            APP_PATH2=$(find /tmp/ipa_check2/Payload -name "*.app" | head -1)
            PATCHED_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH2/Info.plist" 2>/dev/null || echo "NOT_FOUND")
            rm -rf /tmp/ipa_check2
            echo "CFBundleVersion after patch: $PATCHED_VER"

            if [ "$PATCHED_VER" != "$TARGET_BUILD" ]; then
              echo "FATAL: patch failed — got $PATCHED_VER"
              exit 1
            fi
            echo "Patch OK — $IPA_PATH now has version $PATCHED_VER"
          fi

          echo "=== FINAL IPA ==="
          echo "Path: $IPA_PATH"
          echo "Size: $(du -h "$IPA_PATH" | cut -f1)"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for review

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
