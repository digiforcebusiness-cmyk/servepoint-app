workflows:
  ios-release:
    name: iOS Release — App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: 16.2
      cocoapods: default
      groups:
        - apple_credentials   # Apple Distribution certificate + provisioning profile
      vars:
        BUNDLE_ID: "com.app.servepoint"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_APPLE_ID"  # from App Store Connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.servepoint

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    scripts:
      - name: Set up GoogleService-Info.plist
        script: |
          echo $FIREBASE_IOS_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Clean caches and set build number
        script: |
          set -e
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/Archives
          rm -rf build/ios/
          find . -name "version.plist" -delete 2>/dev/null || true
          echo "All caches wiped"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" ios/Runner/Info.plist
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

      - name: Build iOS release IPA
        script: |
          set -e

          echo "=== PRE-BUILD DIAGNOSTICS ==="
          echo "pubspec version: $(grep '^version:' pubspec.yaml)"
          echo "Generated.xcconfig:"
          cat ios/Flutter/Generated.xcconfig
          echo "Source Info.plist CFBundleVersion: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/Runner/Info.plist)"

          flutter build ipa --release --build-number 50 --export-options-plist=/Users/builder/export_options.plist

          echo "=== POST-BUILD DIAGNOSTICS ==="
          cat ios/Flutter/Generated.xcconfig
          XCARCHIVE=$(find build/ios/archive -name "*.xcarchive" 2>/dev/null | head -1)
          echo "xcarchive: $XCARCHIVE"
          APP_IN_ARCHIVE=$(find "$XCARCHIVE/Products/Applications" -name "*.app" 2>/dev/null | head -1)
          ARCH_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_IN_ARCHIVE/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          echo "CFBundleVersion in xcarchive: $ARCH_VER"

          echo "=== IPA VERSION CHECK ==="
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          echo "IPA path: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "FATAL: no IPA found after build"
            exit 1
          fi
          rm -rf /tmp/ipa_verify && unzip -o "$IPA_PATH" -d /tmp/ipa_verify > /dev/null
          APP_IN_IPA=$(find /tmp/ipa_verify/Payload -name "*.app" 2>/dev/null | head -1)
          BUILT_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_IN_IPA/Info.plist" 2>/dev/null || echo "NOT_FOUND")
          rm -rf /tmp/ipa_verify
          echo "CFBundleVersion in IPA: $BUILT_VER"

          if [ "$BUILT_VER" != "50" ]; then
            echo "WARN: IPA has version $BUILT_VER — deleting and patching xcarchive"
            rm -rf build/ios/ipa  # delete FIRST so wrong version cannot be published
            APP_IN_ARCHIVE=$(find "$XCARCHIVE/Products/Applications" -name "*.app" 2>/dev/null | head -1)
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 50" "$APP_IN_ARCHIVE/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion 50" "$XCARCHIVE/Info.plist" 2>/dev/null || true
            xcodebuild -exportArchive \
              -archivePath "$XCARCHIVE" \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/ipa
            IPA_PATH2=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
            rm -rf /tmp/ipa_verify2 && unzip -o "$IPA_PATH2" -d /tmp/ipa_verify2 > /dev/null
            APP_IN_IPA2=$(find /tmp/ipa_verify2/Payload -name "*.app" 2>/dev/null | head -1)
            PATCHED_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_IN_IPA2/Info.plist" 2>/dev/null || echo "NOT_FOUND")
            rm -rf /tmp/ipa_verify2
            echo "CFBundleVersion in patched IPA: $PATCHED_VER"
            if [ "$PATCHED_VER" != "50" ]; then
              echo "FATAL: patch failed — IPA still $PATCHED_VER"
              rm -rf build/ios/ipa
              exit 1
            fi
            echo "Patch OK — IPA is now version $PATCHED_VER"
          else
            echo "Version verified OK: $BUILT_VER"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for review

  android-release:
    name: Android Release — Google Play
    max_build_duration: 45
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      groups:
        - google_play_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "android-v*"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android release AAB
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
